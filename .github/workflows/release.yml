# Release workflow for ltmatrix
#
# This workflow creates releases with cross-platform binaries.
# Triggered by pushing version tags (v*.*.*).
# Creates:
# - GitHub Release with release notes
# - Binary artifacts for all supported platforms
# - Source archives

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

permissions:
  contents: write

jobs:
  # ====================
  # Create GitHub Release
  # ====================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract release notes
        id: extract-notes
        run: |
          # Extract release notes from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            # Get the section for this version
            sed -n "/^## \[${{ steps.get-version.outputs.version }}\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.md || true
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${{ steps.get-version.outputs.version }}" > release_notes.md
          fi

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: ltmatrix ${{ steps.get-version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get-version.outputs.version, '-') }}
          generate_release_notes: true

  # ====================
  # Build Linux Binaries
  # ====================
  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            archive: tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: endsWith(matrix.target, '-musl') || startsWith(matrix.target, 'aarch64')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --features static

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          strip ltmatrix || true
          tar -czvf ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz ltmatrix
          mv ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz

  # ====================
  # Build macOS Binaries
  # ====================
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            archive: tar.gz
          - target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          strip ltmatrix || true
          tar -czvf ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz ltmatrix
          mv ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.tar.gz

  # ====================
  # Build macOS Universal Binary
  # ====================
  build-macos-universal:
    name: Build macOS Universal Binary
    needs: [create-release, build-macos]
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Build for both architectures
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/ltmatrix \
            target/aarch64-apple-darwin/release/ltmatrix \
            -output target/ltmatrix-universal
          strip target/ltmatrix-universal || true

      - name: Package universal binary
        run: |
          cd target
          tar -czvf ltmatrix-${{ needs.create-release.outputs.version }}-universal-apple-darwin.tar.gz ltmatrix-universal
          mv ltmatrix-${{ needs.create-release.outputs.version }}-universal-apple-darwin.tar.gz $GITHUB_WORKSPACE/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ltmatrix-${{ needs.create-release.outputs.version }}-universal-apple-darwin.tar.gz

  # ====================
  # Build Windows Binaries
  # ====================
  build-windows:
    name: Build Windows (${{ matrix.target }})
    needs: create-release
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            archive: zip
          - target: aarch64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          7z a ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip ltmatrix.exe
          mv ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip $GITHUB_WORKSPACE/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ltmatrix-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.zip

  # ====================
  # Publish to Crates.io
  # ====================
  publish-crates:
    name: Publish to Crates.io
    needs: [create-release, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  # ====================
  # Update Homebrew Formula
  # ====================
  update-homebrew:
    name: Update Homebrew Formula
    needs: [create-release, build-macos-universal]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.create-release.outputs.version, '-') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update homebrew tap
        run: |
          echo "Homebrew formula update would go here"
          echo "Version: ${{ needs.create-release.outputs.version }}"
        continue-on-error: true

  # ====================
  # Release Summary
  # ====================
  release-summary:
    name: Release Summary
    needs:
      - create-release
      - build-linux
      - build-macos
      - build-macos-universal
      - build-windows
      - publish-crates
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x86_64 (glibc)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x86_64 (musl/static)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux ARM64 (glibc)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux ARM64 (musl/static)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS x86_64 (Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM64 (Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS Universal Binary" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- Windows ARM64" >> $GITHUB_STEP_SUMMARY