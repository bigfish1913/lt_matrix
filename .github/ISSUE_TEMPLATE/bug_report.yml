name: Bug Report
description: Report a bug to help us improve ltmatrix
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please fill out the sections below to help us understand and fix the issue.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      description: Please confirm the following before submitting
      options:
        - label: I searched for existing issues to prevent duplicates
          required: true
        - label: I'm using the latest version of ltmatrix
          required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: "When I run ltmatrix with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run command `ltmatrix "create a REST API"`
        2. Wait for the generate stage to complete
        3. See error in the execute stage
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The command should complete successfully and create the API"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "The command failed with an error about..."
    validations:
      required: true

  - type: input
    id: ltmatrix-version
    attributes:
      label: ltmatrix Version
      description: Output of `ltmatrix --version`
      placeholder: "ltmatrix 0.1.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "rustc 1.75.0"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Windows 11
        - Windows 10
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (x86_64)
        - Linux (ARM64)
        - Other (specify below)
      default: 4
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version / Distro
      description: Specific OS version or Linux distribution
      placeholder: "Ubuntu 22.04, macOS 14.0, Windows 10 22H2"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Please paste any relevant log output. This will be automatically formatted.
        Run with `--log-level debug` for more detailed logs.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        Your `~/.ltmatrix/config.toml` or relevant configuration (remove sensitive data)
      render: toml
      placeholder: |
        [default]
        agent = "claude"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information about the problem here
      placeholder: "This started happening after I updated..."

  - type: checkboxes
    id: willing-to-help
    attributes:
      label: Willing to Help?
      description: Would you be willing to help investigate or fix this issue?
      options:
        - label: I'm willing to submit a PR to fix this issue
          required: false
        - label: I can provide more information if needed
          required: false
