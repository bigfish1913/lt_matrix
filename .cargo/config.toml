# Cargo configuration for ltmatrix cross-platform builds
#
# This file configures build settings for 7 target platforms:
# - Linux (x86_64, aarch64) with musl for static linking
# - Windows (x86_64, aarch64) with MSVC
# - macOS (Intel x86_64, Apple Silicon aarch64)

[build]
# Use all available CPU cores for compilation
jobs = -1

# =============================================================================
# Compilation Speed Optimizations
# =============================================================================

# Windows x86_64 (MSVC)
[target.x86_64-pc-windows-msvc]
# Increase stack size to prevent stack overflow in tests
rustflags = ["-C", "link-arg=/STACK:4194304"]

# Windows ARM64 (MSVC)
[target.aarch64-pc-windows-msvc]

[term]
verbose = false
color = "auto"

[net]
git-fetch-with-cli = true

# =============================================================================
# Linux Target Configurations
# =============================================================================

[target.x86_64-unknown-linux-musl]

[target.aarch64-unknown-linux-musl]

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# =============================================================================
# macOS Target Configurations
# =============================================================================

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-mmacosx-version-min=10.13"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-mmacosx-version-min=11.0"]

# =============================================================================
# Compilation Profiles
# =============================================================================

# Profile for release builds (optimized for size and performance)
[profile.release]
opt-level = "z"      # Optimize for size
lto = "thin"         # Thin LTO: faster than full LTO, good optimization
codegen-units = 16   # Parallel codegen (16 is default)
strip = true         # Remove debug symbols
panic = "abort"      # Reduce binary size

# Profile for development builds (fast compilation)
[profile.dev]
split-debuginfo = "unpacked"
opt-level = 0        # No optimization for fastest compilation
debug = 1            # Minimal debug info (line tables only)
incremental = true   # Enable incremental compilation

# Profile for testing
[profile.test]
opt-level = 0
debug = 1
incremental = true

# Fast release profile for development iterations
# Use: cargo build --profile fast-release
[profile.fast-release]
inherits = "release"
lto = false          # Disable LTO for fast linking
codegen-units = 256  # Maximum parallelism
opt-level = 2        # Good performance, fast compilation
strip = false        # Keep symbols for debugging

# Optimize dependencies even in dev/test mode
[profile.dev.package."*"]
opt-level = 2

[profile.test.package."*"]
opt-level = 2

# =============================================================================
# Alias Definitions
# =============================================================================

[alias]
linux-release = ["build", "--release", "--target", "x86_64-unknown-linux-musl"]
linux-arm-release = ["build", "--release", "--target", "aarch64-unknown-linux-musl"]
windows-release = ["build", "--release", "--target", "x86_64-pc-windows-msvc"]
windows-arm-release = ["build", "--release", "--target", "aarch64-pc-windows-msvc"]
macos-release = ["build", "--release", "--target", "x86_64-apple-darwin"]
macos-arm-release = ["build", "--release", "--target", "aarch64-apple-darwin"]
fast = ["build", "--profile", "fast-release"]
fast-test = ["test", "--profile", "fast-release"]

# =============================================================================
# HTTP Configuration
# =============================================================================

[http]
check-revoke = true
multiplexing = true
