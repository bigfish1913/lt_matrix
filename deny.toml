# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# This configuration ensures the project maintains good security practices
# by checking for vulnerabilities, license compliance, and other issues.

# The graph table configures how the dependency graph is constructed
[graph]
targets = []

# The output table provides options for how/if diagnostics are outputted
[output]
feature-depth = 1

# This section is considered when running `cargo deny check advisories`
# More documentation: https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
# The path where the advisory databases are cloned/fetched into
# db-path = "$CARGO_HOME/advisory-dbs"

# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]

# A list of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered.
# Example:
# ignore = [
#     # { id = "RUSTSEC-XXXX-XXXX", reason = "Not affected by this vulnerability" },
# ]
ignore = []

# If this is true, then cargo deny will use the git executable to fetch advisory database.
# git-fetch-with-cli = true

# This section is considered when running `cargo deny check licenses`
# More documentation: https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
# List of explicitly allowed licenses (OSI-approved and permissive)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",  # Unicode License v3 - OSI approved
    "Unicode-DFS-2016",  # Unicode License - used by some crates
]

# The confidence threshold for detecting a license from license text
confidence-threshold = 0.8

# Allow 1 or more licenses on a per-crate basis
# exceptions = [
#     # { allow = ["Non-standard-license"], crate = "some-crate" },
# ]

# Clarifications for crates without machine-readable licensing info
# [[licenses.clarify]]
# crate = "ring"
# expression = "MIT AND ISC AND OpenSSL"

# This section is considered when running `cargo deny check bans`
# More documentation: https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"

# Lint level for crates that are explicitly banned
wildcards = "deny"

# Highlight multiple versions of the same crate in the output
highlight = "all"

# List of crates that are banned
# deny = [
#     # { name = "openssl", wrappers = ["native-tls"] },
# ]
deny = []

# Skip certain crates from duplicate detection
skip = []

# This section is considered when running `cargo deny check sources`
# More documentation: https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
# Lint level for crates from unknown registries
unknown-registry = "deny"

# Lint level for crates from unknown git repositories
unknown-git = "warn"

# Allow crates from crates.io (official registry)
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Git sources that are explicitly allowed
allow-git = []